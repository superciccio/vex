name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-latest
            target: macos-arm64
          - os: macos-13
            target: macos-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5'

      - name: Install dependencies
        run: opam install . --deps-only --yes

      - name: Build
        run: opam exec -- dune build

      - name: Run tests
        run: opam exec -- dune exec test/test_eval.exe

      - name: Package binary
        run: |
          cp _build/default/bin/main.exe vex-${{ matrix.target }}
          chmod +x vex-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vex-${{ matrix.target }}
          path: vex-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/vex-*
          generate_release_notes: true
