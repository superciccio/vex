name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-latest
            target: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5'

      - name: Install dependencies
        run: opam install . --deps-only --yes

      - name: Build and test
        run: |
          opam exec -- dune build -p vex @runtest
          opam exec -- dune install --prefix=_dist vex

      - name: Package binary
        run: |
          cp _dist/bin/vex vex-${{ matrix.target }}
          chmod +x vex-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vex-${{ matrix.target }}
          path: vex-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/vex-*
          generate_release_notes: true
